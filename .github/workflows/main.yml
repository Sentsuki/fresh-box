name: Release

permissions:
  contents: write
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-tauri:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 'latest'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*' 
          check-latest: true
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> src-tauri/target

      - name: Download latest stable sing-box core
        run: |
          $release = Invoke-RestMethod `
            -Uri 'https://api.github.com/repos/SagerNet/sing-box/releases/latest' `
            -Headers @{ 'User-Agent' = 'fresh-box-release-workflow' }

          $asset = $release.assets |
            Where-Object { $_.name -like '*windows-amd64.zip' } |
            Select-Object -First 1

          if (-not $asset) {
            throw 'Failed to find the windows-amd64 sing-box package in the latest stable release.'
          }

          $version = $release.tag_name.TrimStart('v')
          $binRoot = 'src-tauri/bin'
          $stableDir = Join-Path $binRoot "stable/$version"
          $extractDir = Join-Path $binRoot '_extract'

          Remove-Item $binRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -Path $stableDir -ItemType Directory -Force | Out-Null

          Write-Output "Downloading stable sing-box $version from: $($asset.browser_download_url)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile 'sing-box.zip'

          7z x 'sing-box.zip' "-o$extractDir" -y | Out-Null

          $executable = Get-ChildItem $extractDir -Filter 'sing-box.exe' -Recurse -File |
            Select-Object -First 1

          if (-not $executable) {
            throw 'Failed to find sing-box.exe in the extracted stable package.'
          }

          Copy-Item (Join-Path $executable.Directory.FullName '*') $stableDir -Recurse -Force

          if (Test-Path (Join-Path $stableDir 'sing-box.exe')) {
            Write-Output "Packaged stable sing-box core at $stableDir"
          } else {
            throw 'Failed to package the stable sing-box core.'
          }

          Remove-Item 'sing-box.zip' -Force
          Remove-Item $extractDir -Recurse -Force
        shell: pwsh

      - name: Install dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tauri-dist-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          name: Release ${{ github.ref_name }}
          body: |
            Automated release for ${{ github.ref_name }} (Windows)
            - Windows installer (.msi) and executable (.exe) included
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
