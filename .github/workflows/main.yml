name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-tauri:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install jq and 7-Zip
        run: |
          choco install jq -y
          choco install 7zip -y
        shell: pwsh

      - name: Download and extract sing-box
        run: |
          # Create src-tauri/bin directory if it doesn't exist
          New-Item -Path src-tauri/bin -ItemType Directory -Force
          # Fetch the latest release download URL for sing-box-windows-amd64.zip
          $url = curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | jq -r '.assets[] | select(.name | contains("windows-amd64.zip")) | .browser_download_url'
          Write-Output "Downloading from: $url"
          # Download the zip file
          curl -L -o sing-box.zip $url
          # Extract sing-box.exe to src-tauri/bin
          7z e sing-box.zip -osrc-tauri/bin sing-box.exe -r
          # Verify the file exists
          if (Test-Path src-tauri/bin/sing-box.exe) { Write-Output "sing-box.exe extracted successfully" }
          else { Write-Output "Failed to extract sing-box.exe"; exit 1 }
          # Clean up
          Remove-Item sing-box.zip
        shell: pwsh

      - name: Install dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-dist-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/exe/*.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/exe/*.exe
          name: Release ${{ github.ref_name }}
          body: |
            Automated release for ${{ github.ref_name }} (Windows)
            - Windows installer (.msi) and executable (.exe) included
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}